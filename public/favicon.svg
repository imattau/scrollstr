<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Motion lines: 2 lines only (closest for clarity) -->
  <g fill="none" stroke-linecap="round" stroke-width="1.5">
    <path d="M37 25 Q46.5 18.75 55.5 23.5" stroke="#863bff"/>
    <path d="M35.5 20 Q45.25 13.75 54.75 18.75" stroke="#863bff" stroke-opacity="0.7"/>
  </g>

  <!-- Nostrich simplified for small sizes -->
  <g transform="rotate(13 32 32)" stroke="#09090b" stroke-width="1.4" stroke-linejoin="round">
    <!-- legs trailing up/back -->
    <g stroke="#B98E5C" stroke-width="1.3" stroke-linecap="round" fill="none">
      <path d="M30.5 22.5 L29 16.5 M29 16.5 l-1.2 1.2 M29 16.5 l-0.2 2 M29 16.5 l1.2 1"/>
      <path d="M33.5 22.75 L35 17 M35 17 l-1.2 1 M35 17 l0.5 2 M35 17 l1.3 0.75"/>
    </g>
    <!-- tail feathers (simplified) -->
    <path d="M32 21 L28.5 16.5 L32 15.5 L35.5 17.5 L34.2 21 Z" fill="#BE9866"/>
    <!-- body -->
    <path d="M32 20.5 C40.5 21 44.5 27.5 42.5 33.75 C41 38.25 37.5 40 32 40 C26.5 40 23 38.25 21.5 33.75 C19.5 27.5 23.5 21 32 20.5 Z" fill="#C49E6C"/>
    <!-- wing (simplified) -->
    <path d="M30 24.5 C24.5 25.5 22 29.5 24 34 C25.5 31 28.5 28.75 30.5 28 C29.75 26.5 29.75 25.5 30 24.5 Z" fill="#BE9866"/>
    <!-- neck -->
    <path d="M28.5 39 C27.5 42 27.5 43.5 28.5 45.75 L35.5 45.75 C36.5 43.5 36.5 42 35.5 39.25 Z" fill="#C49E6C"/>
    <!-- head -->
    <circle cx="32" cy="45.75" r="4.5" fill="#C49E6C"/>
    <!-- beak (simplified) -->
    <path d="M28.5 47.5 L32 52 L35.5 47.5 Z" fill="#E2A55F"/>
    <!-- eye (simplified) -->
    <circle cx="29" cy="45" r="1.2" fill="#fff"/>
    <circle cx="28.75" cy="45.25" r="0.6" fill="#09090b"/>
  </g>
</svg>
